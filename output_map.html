  <style>
  
  .price-tag{
	border-radius: 8px;
	color: #FFFFFF;
	font-size: 14px;
	padding: 4px 8px;
	position: relative;
	transform: translateY(-8px);
  }
  .price-tag::after{
	content: "";
	position: absolute;
	left: 50%;
	top: 100%;
	transform: translate(-50%, 0);
	width: 0;
	height: 0;
	border-left: 6px solid transparent;
	border-right: 6px solid transparent;
  }

  .price-tag-highlight{
	background-color: #00FF00;
	color: #000000;
  }
  .active-tag {
  background-color: #309600;
}

.active-tag::after {
  border-top: 6px solid #309600;
}
.pending-tag {
  background-color: #3e67cf;
}

.pending-tag::after {
  border-top: 6px solid #3e67cf;
}
.sold-tag {
  background-color: #d33100;
}

.sold-tag::after {
  border-top: 6px solid #d33100;
}
.table-container {
        display: flex;
        flex-direction: column;
		width: 35vw;
    }
#button-hflex {
	display: flex;
	flex-direction: row;
	margin-left: -0.5vw;
	padding-top: 1vh;
	padding-bottom: 1vh;
	margin-top: -1vh;
	background-color: #f0f0f08f;
}
body{
	display: flex;
	flex-direction: row;
	overflow-x: hidden;
}
.list-button{
	vertical-align: middle;
	width: 8vw;
	height: 5vh;
	margin-left: 1vw;
	margin-right: 1vw;
	border: 1px solid #c7c7c7;
	font-family:Helvetica,Arial;
	font-size:14px;
	color: #232323;
	background-color: #ffffff;
	border-radius: 50px;
	padding-left: 1vw;
	padding-right: 1vw;
	padding-top: 0.5vh;
	padding-bottom: 0.5vh;
	font-weight: bold;
}
@keyframes button-clicked{
	from {background-color: #eeeeee; border: 2px solid #818181;}
	to {background-color:rgba(52, 52, 235, 0.3); border: 2px solid #0004ff;}
}

@keyframes button-hovered{
	from {background-color: #ffffff; border: 1px solid #c7c7c7;}
	to {border: 1px solid #818181; background-color: #eeeeee;}
}

@keyframes button-focused{
	from {background-color:rgba(52, 52, 235, 0.3); border: 1px solid #0004ff;}
	to{border: 1px solid #4e53a1; background-color:rgba(101, 101, 224, 0.2);}
}
.list-button.list-button:focus{
	animation-name: button-focused;
	animation-duration: 0.5s;
	border: 1px solid #4e53a1;
	background-color:rgba(101, 101, 224, 0.2);
}
.list-button:hover{
	animation-name: button-hovered;
	animation-duration:0.2s;
	border: 1px solid #818181;
	background-color: #eeeeee;
}

.list-button.list-button:active{
	animation-name: button-clicked;
	animation-duration: 0.3s;
	background-color: rgba(52, 52, 235, 0.3);
	border: 2px solid #1d29d3;
	
}
#header-row{
	background-color: #f0f0f0;
	font-family:Helvetica,Arial;
	font-size: 16px;
	color:#c5a95e;
}
th{
	text-align: left;
	padding-right: 1vw;
	padding-left: 0.1vw;
	padding-top: 0.5vh;
	padding-bottom: 0.5vh;
}
tr{
	font-family: Helvetica, Arial;
	font-size: 12px;
	color:#646464;
}
td{
	padding-top: 0.5vh;
	padding-bottom: 0.5vh;
}
.tr2{
	background-color: #f0f0f0;
}
.tr-highlight{
	background-color: #00ff00;
}

.addresstd{
	color: #0000EE;
}
.activetd{
	color: #309600;
}
.pendingtd{
	color: #3e67cf;
}
.soldtd{
	color: #d33100;
}
.dot{
	height: 0.5vw;
	width: 0.5vw;
	border-radius: 50px;
	display: inline-block;
	vertical-align: middle;
	margin-right: 0.5vw;
}
.active-dot{
	background-color: #309600;
}
.pending-dot{
	background-color: #3e67cf;
}
.sold-dot{
	background-color: #d33100;
}

	function formatPrice(p){
		var output = "";
		if (p.indexOf(".") == -1){
			p = p.replace("K", ".0K").replace("M", ".0M");
		}
		output += String(p).replace("K", "000").replace("M", "000000");
		while ((output.length - output.indexOf(".") - 1) % 3 != 0){
			output = output.substring(0, output.length - 1);
		}
		output = output.replace(".", ",")
		if (output.length > 7){
			output = output.slice(0, output.length - 3) + "," + output.slice(output.length - 3);
		}
		return "$" + output;
	}
	function highlightMarker(marker, locationRow, savedClassList){
		return function() {
		var classList = marker.content.classList;
		locationRow.className = "tr-highlight";
		while (classList.length > 0){
			savedClassList.push(classList.item(0));
			classList.remove(classList.item(0));
		}
		classList.add("price-tag");
		classList.add("price-tag-highlight");
		}
	}
	function unhighlightMarker(marker, locationRow, savedClassList){
		return function() {
		locationRow.className = locationRow.getAttribute("rowClass");
		marker.content.className = "";
		for (let x = 0; x < savedClassList.length; x++){
			marker.content.classList.add(savedClassList[x]);
		}
		savedClassList.length = 0;
		}
	}


	function initializeListings(map){
		listings_table.innerHTML = initial_table_html;
		for (let i = 0; i < map_markers.length; i++){
			const marker = map_markers[i][0];
			const status = map_markers[i][1][1];
			const address = map_markers[i][1][0];
			const price = map_markers[i][1][4];

			marker.setMap(map);
			const locationRow = listings_table.insertRow();
			if (i % 2 != 0){
				locationRow.className = "tr2";
				locationRow.setAttribute("rowClass", "tr2");
			} else{
				locationRow.setAttribute("rowClass", "tr");
			}
			for (var j = 0; j < 5; j++){
				const newCell = locationRow.insertCell();
				newCell.textContent = map_markers[i][1][j];
				if (j == 0){
					newCell.className = "addresstd";
				} else if (j == 1){
					if (status == "ACT"){
						newCell.className = "activetd";
						newCell.textContent = "Active";
					} else if (status == "PEND"){
						newCell.className = "pendingtd";
						newCell.textContent = "Pending";
					} else if (status == "SOLD"){
						newCell.className = "soldtd";
						newCell.textContent = "Sold";
					} 
				} else if (j == 4){
						let cont = "";
						price_frags = price.split(" - ");
						for (let x = 0; x < price_frags.length; x++){
							cont += formatPrice(price_frags[x]) + " - ";
						}
						cont = cont.substring(0, cont.length - 3);
						newCell.textContent = cont;

				}
			}
			var pre = [];
			locationRow.addEventListener("mouseenter", highlightMarker(marker, locationRow, pre));
			locationRow.addEventListener("mouseleave", unhighlightMarker(marker, locationRow, pre));
			marker.content.addEventListener("mouseenter", highlightMarker(marker, locationRow, pre));
			marker.content.addEventListener("mouseleave", unhighlightMarker(marker, locationRow, pre));
				
		}
	}
	function hideListings(){
		for (let i = 0; i < listings_table.rows.length; i++){
			const locationRow = listings_table.rows[i];
			locationRow.style.display = "none";
		}
		for (let i = 0; i < map_markers.length; i++){
			map_markers[i][0].setMap(null);
		}
	}
	function showListings(map){
		hideListings();
		for (let i = 0; i < listings_table.rows.length; i++){
			const locationRow = listings_table.rows[i];
			locationRow.style.display = "";
			if (i % 2 == 0){
				locationRow.className = "tr2";
				locationRow.setAttribute("rowClass", "tr2");
			} else{
				locationRow.className = "tr";
				locationRow.setAttribute("rowClass", "tr");
			}
		}
		for (let i = 0; i < map_markers.length; i++){
			map_markers[i][0].setMap(map);
		}
	}

	function showListingsOnClass(map, stat){
		hideListings();
		var numRows = 0;
		for (let i = 0; i < listings_table.rows.length; i++){
			const locationRow = listings_table.rows[i];
			rowStatus = locationRow.cells[1].innerHTML.toLowerCase();
			if (rowStatus === stat || rowStatus === "status"){
				locationRow.style.display = "";
				if (numRows % 2 == 0){
					locationRow.className = "tr2";
					locationRow.setAttribute("rowClass", "tr2");
				} else{
					locationRow.className = "tr";
					locationRow.setAttribute("rowClass", "tr");
				}
				numRows++;
			}
		}
		for (let i = 0; i < map_markers.length; i++){
			if (stat === "active"){
				stat = "act";
			} else if (stat === "pending"){
				stat = "pend";
			}
			if (map_markers[i][1][1].toLowerCase() === stat)
				map_markers[i][0].setMap(map);
		}
	}
